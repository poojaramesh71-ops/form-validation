<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Validation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <form id="myForm">
    <label>
      Name:
      <input type="text" id="name">
    </label>

    <label>
      Email:
      <input type="text" id="email">
    </label>

    <label>
      Password:
      <input type="password" id="password">
    </label>

    <button type="submit">Submit</button>

    <p id="error"></p>
  </form>

  <script src="script.js"></script>
</body>
</html>
